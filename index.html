<!DOCTYPE html>
<html>
<head>
  <title>WebRTC File Transfer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>File Transfer Utility</h2>

<div class="window">
  <div class="title">Instructions</div>
  <div class="content">
    <b>User A</b>: Create Offer → Send<br>
    <b>User B</b>: Paste → Generate Answer → Send back<br>
    <b>User A</b>: Paste Answer → Connect<br>
  </div>
</div>

<div class="window">
  <div class="title">Connection</div>
  <div class="content">
    <button onclick="createOffer()">Create Offer</button>
    <button onclick="acceptOffer()">Generate Answer</button>
    <button onclick="acceptAnswer()">Connect</button>
    <p>Status: <span id="status">Idle</span></p>
  </div>
</div>

<div class="window">
  <div class="title">Offer</div>
  <div class="content">
    <textarea id="offerBox" placeholder="Paste Offer here"></textarea>
    <button onclick="copyOffer()">Copy Offer</button>
  </div>
</div>

<div class="window">
  <div class="title">Answer</div>
  <div class="content">
    <textarea id="answerBox" placeholder="Paste Answer here"></textarea>
    <button onclick="copyAnswer()">Copy Answer</button>
  </div>
</div>

<div class="window">
  <div class="title">Code Mode</div>
  <div class="content">
    <select id="mode">
      <option value="base64">Base64</option>
      <option value="qr">QR</option>
    </select>
    <div id="qr"></div>
  </div>
</div>

<div class="window">
  <div class="title">File Transfer</div>
  <div class="content">
    <input type="file" id="fileInput">
    <button onclick="sendFile()">Send File</button>
    <p>Progress: <span id="progress">0%</span></p>
  </div>
</div>

<!-- 🔥 NEW CHAT SECTION -->
<div class="window">
  <div class="title">Text Chat</div>
  <div class="content">

    <div id="chatBox" style="height:150px; overflow:auto; border:2px solid black; padding:5px; background:white;"></div>

    <input type="text" id="chatInput" placeholder="Type message" style="width:80%;">
    <button onclick="sendMessage()">Send</button>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="app.js"></script>

</body>
</html>
